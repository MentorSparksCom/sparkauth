{{ define "title" }}Error{{ end }}

{{ define "content" }}
<div class="auth-card card">
    <div class="auth-logo auth-logo-error">
        <i class="fa-solid fa-circle-exclamation"></i>
    </div>

    <h2>Something went wrong</h2>

    <p class="text-muted auth-subtitle">{{ .Error }}</p>

    <a href="/login" class="button button-accent button-full" style="margin-top: 24px;">
        <i class="fa-solid fa-arrow-left"></i> Back to sign in
    </a>
</div>
{{ end }}
